apiVersion: v2
name: klaus-gateway
description: Channel and routing gateway in front of klaus instances; uses agentgateway as the LLM/MCP/A2A data plane
type: application
# `version` and `appVersion` are placeholders. The CI pipeline runs through
# `architect/push-to-app-catalog` with the `app-build-suite` executor, which
# rewrites both fields to the git tag (e.g. `0.0.4`) at chart-build time. The
# default `image.tag` (see templates/_helpers.tpl) then resolves to the same
# tag the auto-release workflow publishes to gsoci. Mirrors the klaus and
# mcp-prometheus chart conventions.
version: 0.1.0
appVersion: 0.1.0
# app-build-suite's GiantSwarmHelmValidator requires an `icon`. Re-using the
# generic Giant Swarm app icon since klaus-gateway doesn't have a dedicated
# icon yet.
icon: https://s.giantswarm.io/app-icons/giantswarm/1/light.svg
home: https://github.com/giantswarm/klaus-gateway
sources:
  - https://github.com/giantswarm/klaus-gateway
annotations:
  io.giantswarm.application.team: bumblebee
  # Upstream agentgateway CRD version (agentgateway.dev/v1alpha1) these
  # templates target. Bump when upstream introduces breaking schema changes.
  klaus-gateway.giantswarm.io/agentgateway-version: v1.1.0
maintainers:
  - name: Giant Swarm
    url: https://www.giantswarm.io
