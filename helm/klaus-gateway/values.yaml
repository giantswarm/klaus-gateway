# Default values for klaus-gateway.

name: klaus-gateway
serviceType: managed

image:
  registry: gsoci.azurecr.io
  name: giantswarm/klaus-gateway
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

# Log level: debug, info, warn, error.
logLevel: info

pod:
  user:
    id: 65532
  group:
    id: 65532

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

serviceAccount:
  create: true
  annotations: {}

# Public HTTP server (channel adapters + /v1/* front door).
server:
  port: 8080

# Admin endpoints: /healthz, /readyz, /metrics.
admin:
  port: 8081

metrics:
  enabled: true

serviceMonitor:
  enabled: true
  interval: "60s"
  scrapeTimeout: "45s"

# Routing table backend.
#   memory    -- process-local; state lost on restart.
#   bolt      -- persistent local file; requires a writable mount at boltPath.
#   configmap -- cluster-backed; one ConfigMap "klaus-gateway-routes" per namespace.
routing:
  store: memory
  boltPath: /var/lib/klaus-gateway/routes.bolt
  # Default TTL for route entries (e.g. "24h"). Zero means never expire.
  defaultTTL: "24h"
  # Create instances on demand when a route key has no entry.
  autoCreate: false

# Lifecycle driver: klausctl (local) or operator (MCP to klaus-operator).
lifecycle:
  driver: operator
  klausctlBin: ""
  operatorMCPURL: ""
  # Bearer token for the operator MCP endpoint; empty disables auth.
  operatorMCPToken: ""

# Upstream wiring.
# When empty the gateway talks directly to instance BaseURLs.
# When set, outgoing requests are rewritten through this agentgateway and the
# instance name is passed via the X-Klaus-Instance header.
upstream:
  agentgatewayURL: ""

observability:
  # OTLP gRPC endpoint for traces (e.g. tempo.observability.svc:4317).
  # Empty disables trace export; in-process spans are still created.
  otlpEndpoint: ""

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

# Optional Kubernetes Gateway API + agentgateway CRDs that sit in front of this
# gateway. Rendered only when agentgateway.enabled is true so the chart stays
# installable in clusters without the agentgateway CRDs.
#
# Targets upstream agentgateway v1.1.0 (agentgateway.dev/v1alpha1).
agentgateway:
  enabled: false
  # gatewayClassName of the Gateway API controller that reconciles the Gateway.
  gatewayClassName: agentgateway

  # Gateway rendering. When create is false, the chart does not render a
  # Gateway and the HTTPRoute attaches to the externally-managed Gateway
  # referenced by parentRefs.
  gateway:
    create: true
    parentRefs: []
    # Listener definitions applied when create is true.
    listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    annotations: {}

  routes:
    # Primary route: /v1/* and /mcp traffic enters klaus-gateway, which then
    # dispatches to the right klaus instance.
    chatAndMcp:
      enabled: true
      prefixes:
      - /v1/
      - /mcp
    # Direct-to-instance IDE traffic. Normally populated by klaus-operator at
    # runtime, so off by default in the chart.
    directInstance:
      enabled: false

  # AgentgatewayPolicy attached to the Gateway.
  # Upstream v1.1.0 supports JWT but not Cedar. Cedar will be wired in when it
  # lands upstream; see docs/deployment.md.
  policy:
    enabled: false
    # JWT validation via spec.traffic.jwtAuthentication.
    jwt:
      enabled: false
      mode: Strict
      issuer: ""
      audiences: []
      jwks:
        # "inline" (literal JWKS JSON) or "remote" (jwksPath + backendRef).
        mode: remote
        inline: ""
        remote:
          jwksPath: /.well-known/jwks.json
          cacheDuration: 5m
          backendRef:
            group: ""
            kind: Service
            name: ""
            namespace: ""
            port: 443

  # Example AgentgatewayBackend pointing at a single klaus instance Service.
  # Real cluster usage creates one Backend per instance, owned by
  # klaus-operator.
  backendsExample:
    enabled: false
    name: klaus-instance-example
    static:
      host: klaus-instance-example.default.svc.cluster.local
      port: 8080

# Slack channel adapter.
# Disabled by default. To enable, set slack.enabled: true and provide a
# Kubernetes Secret named by slack.secretName containing the following keys:
#   bot-token        -- Slack bot ... bot OAuth token
#   signing-secret   -- signing secret for Events API request verification
#   app-token        -- Slack app-level ... app-level token (socketmode only)
#
# The secret values are injected as SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET,
# and SLACK_APP_TOKEN environment variables respectively.
slack:
  enabled: false
  # mode selects the connection method: "events" (Events API webhook,
  # production) or "socketmode" (Socket Mode WebSocket, development).
  mode: events
  # secretName is the name of the Kubernetes Secret with Slack credentials.
  # Required when slack.enabled is true.
  secretName: ""

global:
  podSecurityStandards:
    enforced: false

nodeSelector: {}

tolerations: []

affinity: {}
