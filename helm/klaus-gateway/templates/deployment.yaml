apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "resource.default.name" . }}
  namespace: {{ include "resource.default.namespace" . }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "labels.selector" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: {{ .Chart.Name }}
      labels:
        {{- include "labels.selector" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "resource.default.name" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.pod.user.id }}
        runAsGroup: {{ .Values.pod.group.id }}
        {{- with .Values.podSecurityContext }}
          {{- . | toYaml | nindent 8 }}
        {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.registry }}/{{ .Values.image.name }}:{{ include "image.tag" . }}"
        imagePullPolicy: "{{ .Values.image.pullPolicy }}"
        args:
        - --listen-address=:{{ .Values.server.port }}
        - --admin-address=:{{ .Values.admin.port }}
        - --log-level={{ .Values.logLevel }}
        - --store={{ .Values.routing.store }}
        {{- if eq .Values.routing.store "bolt" }}
        - --bolt-path={{ .Values.routing.boltPath }}
        {{- end }}
        {{- if eq .Values.routing.store "configmap" }}
        - --namespace=$(POD_NAMESPACE)
        {{- end }}
        {{- if .Values.routing.defaultTTL }}
        - --default-ttl={{ .Values.routing.defaultTTL }}
        {{- end }}
        {{- if .Values.routing.autoCreate }}
        - --auto-create
        {{- end }}
        - --driver={{ .Values.lifecycle.driver }}
        {{- if and (eq .Values.lifecycle.driver "klausctl") .Values.lifecycle.klausctlBin }}
        - --klausctl-bin={{ .Values.lifecycle.klausctlBin }}
        {{- end }}
        {{- if eq .Values.lifecycle.driver "operator" }}
        {{- if .Values.lifecycle.operatorMCPURL }}
        - --operator-mcp-url={{ .Values.lifecycle.operatorMCPURL }}
        {{- end }}
        {{- if .Values.lifecycle.operatorMCPToken }}
        - --operator-mcp-token={{ .Values.lifecycle.operatorMCPToken }}
        {{- end }}
        {{- end }}
        {{- if .Values.upstream.agentgatewayURL }}
        - --agentgateway-url={{ .Values.upstream.agentgatewayURL }}
        {{- end }}
        {{- if .Values.observability.otlpEndpoint }}
        - --otel-otlp-endpoint={{ .Values.observability.otlpEndpoint }}
        {{- end }}
        {{- if .Values.slack.enabled }}
        - --slack-enabled
        - --slack-mode={{ .Values.slack.mode }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.server.port }}
          protocol: TCP
        - name: admin
          containerPort: {{ .Values.admin.port }}
          protocol: TCP
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- if and .Values.slack.enabled .Values.slack.secretName }}
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.slack.secretName }}
              key: bot-token
        - name: SLACK_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.slack.secretName }}
              key: signing-secret
        {{- if eq .Values.slack.mode "socketmode" }}
        - name: SLACK_APP_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.slack.secretName }}
              key: app-token
              optional: true
        {{- end }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: admin
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: admin
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          {{- with .Values.securityContext }}
            {{- . | toYaml | nindent 10 }}
          {{- end }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
