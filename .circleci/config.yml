version: 2.1

orbs:
  architect: giantswarm/architect@6.15.0

jobs:
  e2e-local:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Run end-to-end compose smoke test
          command: make e2e-local
      - run:
          name: Dump container logs on failure
          when: on_fail
          command: |
            docker compose -f deploy/docker-compose.yml ps || true
            docker compose -f deploy/docker-compose.yml logs --no-color --tail=200 || true

workflows:
  test:
    jobs:
      - architect/go-build:
          context: architect
          name: go-build
          binary: klaus-gateway
          filters:
            tags:
              only: /^v.*/

      - e2e-local:
          filters:
            tags:
              only: /^v.*/

      # Branch builds: amd64 only for faster PR feedback.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-registries
          platforms: "linux/amd64"
          requires:
            - go-build
          filters:
            branches:
              ignore:
                - main
                - master

      # Tag builds: full multi-arch (amd64 + arm64) so the image runs on
      # spidertron's DGX Spark.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-registries-release
          requires:
            - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      - architect/push-to-app-catalog:
          context: architect
          name: push-to-app-catalog
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: klaus-gateway
          requires:
            - push-to-registries
          filters:
            branches:
              ignore:
                - main
                - master

      - architect/push-to-app-catalog:
          context: architect
          name: push-to-app-catalog-release
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: klaus-gateway
          requires:
            - push-to-registries-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
