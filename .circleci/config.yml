version: 2.1

orbs:
  architect: giantswarm/architect@7.0.0

workflows:
  test:
    jobs:
      - architect/go-build:
          context: architect
          name: go-build
          binary: klaus-gateway
          # Main package lives at cmd/klaus-gateway -- the architect orb
          # defaults `path` to "." which has no Go files in this repo.
          path: ./cmd/klaus-gateway
          filters:
            tags:
              only: /^v.*/

      # Branch builds: amd64 only for faster PR feedback.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-registries
          platforms: "linux/amd64"
          requires:
            - go-build
          filters:
            branches:
              ignore:
                - main
                - master

      # Main builds: full multi-arch (amd64 + arm64) so the :latest tag
      # works on every spidertron node, including the arm64 GPU sparks.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-registries-latest
          tag-latest-branch: main
          requires:
            - go-build
          filters:
            branches:
              only: main

      # Tag builds: push multi-arch image to gsoci (primary registry).
      # Chart push depends on this completing successfully.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-gsoci-release
          registries-data: "public gsoci.azurecr.io ACR_GSOCI_USERNAME ACR_GSOCI_PASSWORD true"
          requires:
            - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      # Tag builds: push multi-arch image to all registries (including China
      # mirrors). Runs in parallel and does NOT block the chart push, so a
      # slow/unreachable mirror only delays itself, not the primary delivery
      # pipeline. Mirrors the mcp-prometheus split.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-all-registries-release
          requires:
            - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      # Use the app-build-suite executor (same as klaus + mcp-prometheus) so
      # the chart's `version`/`appVersion` get rewritten from the git tag at
      # build time, instead of going through architect's strict
      # `helm-chart-template` validator -- which requires
      # `pkg/project/project.go` to literally match the tag and would
      # otherwise fail every tag build.
      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: push-to-app-catalog
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: klaus-gateway
          requires:
            - push-to-registries
          filters:
            branches:
              ignore:
                - main
                - master

      # Tag: push chart after gsoci image is up. Intentionally does NOT
      # depend on push-to-all-registries-release so the chart catalog can
      # publish the new version even if the China mirror is slow.
      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: push-to-app-catalog-release
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: klaus-gateway
          requires:
            - push-to-gsoci-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
