version: 2.1

orbs:
  architect: giantswarm/architect@6.15.0

workflows:
  test:
    jobs:
      - architect/go-build:
          context: architect
          name: go-build
          binary: klaus-gateway
          filters:
            tags:
              only: /^v.*/

      # Branch builds: amd64 only for faster PR feedback.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-registries
          platforms: "linux/amd64"
          requires:
            - go-build
          filters:
            branches:
              ignore:
                - main
                - master

      # Main builds: full multi-arch (amd64 + arm64) so the :latest tag
      # works on every spidertron node, including the arm64 GPU sparks.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-registries-latest
          tag-latest-branch: main
          requires:
            - go-build
          filters:
            branches:
              only: main

      # Tag builds: full multi-arch (amd64 + arm64) so the image runs on
      # spidertron's DGX Spark.
      - architect/push-to-registries-multiarch:
          context: architect
          name: push-to-registries-release
          requires:
            - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      - architect/push-to-app-catalog:
          context: architect
          name: push-to-app-catalog
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: klaus-gateway
          requires:
            - push-to-registries
          filters:
            branches:
              ignore:
                - main
                - master

      - architect/push-to-app-catalog:
          context: architect
          name: push-to-app-catalog-release
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: klaus-gateway
          requires:
            - push-to-registries-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
